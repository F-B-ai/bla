name: Installazione Ibrida (TestFlight + APK)

on:
  workflow_dispatch:
    inputs:
      skip_ios:
        description: 'Salta build iOS/TestFlight'
        required: false
        default: false
        type: boolean
      skip_android:
        description: 'Salta build Android/APK'
        required: false
        default: false
        type: boolean
      auto_submit_testflight:
        description: 'Invia automaticamente a TestFlight dopo la build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # iOS: Build + Submit a TestFlight
  # ─────────────────────────────────────────────
  ios-testflight:
    if: ${{ !inputs.skip_ios }}
    name: iOS → TestFlight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS per TestFlight
        run: |
          if [ "${{ inputs.auto_submit_testflight }}" = "true" ]; then
            eas build --profile testflight --platform ios --non-interactive --auto-submit
          else
            eas build --profile testflight --platform ios --non-interactive
          fi

      - name: Riepilogo build iOS
        if: always()
        run: |
          echo "## 🍎 iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.auto_submit_testflight }}" = "true" ]; then
            echo "Build completata e inviata a **TestFlight**." >> $GITHUB_STEP_SUMMARY
            echo "Controlla App Store Connect per lo stato della review." >> $GITHUB_STEP_SUMMARY
          else
            echo "Build completata. Per inviare a TestFlight:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "cd fitness-app && eas submit --profile testflight --platform ios" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Controlla lo stato su [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Android: Build APK per installazione diretta
  # ─────────────────────────────────────────────
  android-apk:
    if: ${{ !inputs.skip_android }}
    name: Android → APK Diretto
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK Android
        run: eas build --profile internal --platform android --non-interactive

      - name: Riepilogo build Android
        if: always()
        run: |
          echo "## 🤖 Android Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK generato per installazione diretta." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Come installare:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Vai su [expo.dev](https://expo.dev) → Builds" >> $GITHUB_STEP_SUMMARY
          echo "2. Scarica l'APK" >> $GITHUB_STEP_SUMMARY
          echo "3. Invia il file al telefono Android" >> $GITHUB_STEP_SUMMARY
          echo "4. Apri e installa (abilita 'Fonti sconosciute' se richiesto)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Riepilogo finale
  # ─────────────────────────────────────────────
  summary:
    name: Riepilogo Installazione Ibrida
    runs-on: ubuntu-latest
    needs: [ios-testflight, android-apk]
    if: always()

    steps:
      - name: Riepilogo
        run: |
          echo "# Installazione Ibrida ESSĒRE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Piattaforma | Metodo | Stato |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.ios-testflight.result }}" = "success" ]; then
            echo "| iOS | TestFlight | Completato |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.ios-testflight.result }}" = "skipped" ]; then
            echo "| iOS | TestFlight | Saltato |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| iOS | TestFlight | Fallito |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.android-apk.result }}" = "success" ]; then
            echo "| Android | APK Diretto | Completato |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.android-apk.result }}" = "skipped" ]; then
            echo "| Android | APK Diretto | Saltato |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android | APK Diretto | Fallito |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Gestisci le build su [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY
