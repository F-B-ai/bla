name: "Rilascio Produzione (App Store + Google Play)"

on:
  workflow_dispatch:
    inputs:
      skip_ios:
        description: 'Salta build/submit iOS (App Store)'
        required: false
        default: false
        type: boolean
      skip_android:
        description: 'Salta build/submit Android (Google Play)'
        required: false
        default: false
        type: boolean
      auto_submit:
        description: 'Invia automaticamente agli store dopo la build'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # iOS: Build + Submit a App Store
  # ─────────────────────────────────────────────
  ios-appstore:
    if: ${{ !inputs.skip_ios }}
    name: "iOS → App Store"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS per App Store
        run: |
          if [ "${{ inputs.auto_submit }}" = "true" ]; then
            eas build --profile production --platform ios --non-interactive --auto-submit
          else
            eas build --profile production --platform ios --non-interactive
          fi

      - name: Riepilogo build iOS
        if: always()
        run: |
          echo "## 🍎 iOS Production Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.auto_submit }}" = "true" ]; then
            echo "Build completata e inviata all'**App Store Connect**." >> $GITHUB_STEP_SUMMARY
            echo "Controlla App Store Connect per lo stato della review." >> $GITHUB_STEP_SUMMARY
          else
            echo "Build completata. Per inviare all'App Store:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "cd fitness-app && eas submit --profile production --platform ios" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Controlla lo stato su [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Android: Build + Submit a Google Play
  # ─────────────────────────────────────────────
  android-playstore:
    if: ${{ !inputs.skip_android }}
    name: "Android → Google Play"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Decodifica Service Account Google
        run: echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" | base64 -d > google-service-account.json

      - name: Build Android per Google Play
        run: |
          if [ "${{ inputs.auto_submit }}" = "true" ]; then
            eas build --profile production --platform android --non-interactive --auto-submit
          else
            eas build --profile production --platform android --non-interactive
          fi

      - name: Pulizia credenziali
        if: always()
        run: rm -f google-service-account.json

      - name: Riepilogo build Android
        if: always()
        run: |
          echo "## 🤖 Android Production Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.auto_submit }}" = "true" ]; then
            echo "Build completata e inviata a **Google Play** (track: production)." >> $GITHUB_STEP_SUMMARY
            echo "Controlla Google Play Console per lo stato della review." >> $GITHUB_STEP_SUMMARY
          else
            echo "Build completata. Per inviare a Google Play:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "cd fitness-app && eas submit --profile production --platform android" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Controlla lo stato su [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Riepilogo finale
  # ─────────────────────────────────────────────
  summary:
    name: Riepilogo Rilascio Produzione
    runs-on: ubuntu-latest
    needs: [ios-appstore, android-playstore]
    if: always()

    steps:
      - name: Riepilogo
        run: |
          echo "# Rilascio Produzione ESSĒRE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Piattaforma | Store | Stato |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|-------|-------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.ios-appstore.result }}" = "success" ]; then
            echo "| iOS | App Store | Completato |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.ios-appstore.result }}" = "skipped" ]; then
            echo "| iOS | App Store | Saltato |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| iOS | App Store | Fallito |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.android-playstore.result }}" = "success" ]; then
            echo "| Android | Google Play | Completato |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.android-playstore.result }}" = "skipped" ]; then
            echo "| Android | Google Play | Saltato |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android | Google Play | Fallito |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Prossimi passi" >> $GITHUB_STEP_SUMMARY
          echo "- **iOS**: Vai su [App Store Connect](https://appstoreconnect.apple.com) per gestire la review e la distribuzione" >> $GITHUB_STEP_SUMMARY
          echo "- **Android**: Vai su [Google Play Console](https://play.google.com/console) per gestire il rilascio" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: Controlla lo stato su [expo.dev](https://expo.dev)" >> $GITHUB_STEP_SUMMARY
