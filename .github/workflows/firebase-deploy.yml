name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - master
      - claude/fitness-coaching-app-*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: fitness-app

      - name: Build web app
        run: npm run build:web
        working-directory: fitness-app

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > ${{ runner.temp }}/firebase-sa.json

      - name: Deploy Firestore rules and indexes
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project essere-3fe6f
        working-directory: fitness-app
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: essere-3fe6f
          entryPoint: fitness-app
