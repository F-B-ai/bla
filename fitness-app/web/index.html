<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ESSĒRE" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>ESSĒRE</title>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #0D0D0D; }

    /* Ionicons font - served locally to avoid CDN/CORS issues on iOS Safari */
    /* Expo/react-native-vector-icons uses lowercase 'ionicons' as font-family */
    @font-face {
      font-family: 'Ionicons';
      src: url('/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'ionicons';
      src: url('/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
  </style>
  <link rel="preload" href="/Ionicons.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
  <script>
    // Force-load Ionicons font via FontFace API for all browsers (including iOS Safari)
    // This ensures the font is registered and downloading before JS bundle executes
    (function() {
      if (typeof FontFace !== 'undefined') {
        var names = ['Ionicons', 'ionicons'];
        var promises = [];
        names.forEach(function(name) {
          var font = new FontFace(name, 'url(/Ionicons.ttf)', {
            weight: 'normal',
            style: 'normal',
            display: 'block'
          });
          promises.push(
            font.load().then(function(loaded) {
              document.fonts.add(loaded);
            }).catch(function(err) {
              console.warn(name + ' font load failed:', err);
            })
          );
        });
        // Store promise globally so App.tsx can await it
        window.__ioniconsReady = Promise.all(promises);
      } else {
        window.__ioniconsReady = Promise.resolve();
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    // Register service worker with auto-update
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          // Track if SW was already controlling the page (not first install)
          var hasController = !!navigator.serviceWorker.controller;
          // Check for updates every 60 seconds
          setInterval(function() { reg.update(); }, 60000);
          // When a new SW is found and activated, reload to get latest version
          // Skip reload on first install to avoid interrupting font loading
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && hasController) {
                window.location.reload();
              }
            });
          });
        });
      });
    }
  </script>
</body>
</html>
