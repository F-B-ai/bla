<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ESSĒRE" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>ESSĒRE</title>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #0D0D0D; }

    /* Ionicons font - lowercase 'ionicons' to match @expo/vector-icons fontFamily */
    @font-face {
      font-family: 'ionicons';
      src: url('https://unpkg.com/@expo/vector-icons@14.0.4/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    /* Hidden element to force iOS Safari to load the font early */
    .ionicons-preload { font-family: 'ionicons'; position: absolute; visibility: hidden; }
  </style>
  <link rel="preload" href="https://unpkg.com/@expo/vector-icons@14.0.4/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
  <script>
    // Force-load Ionicons font via FontFace API for iOS Safari
    (function() {
      // Create a hidden element that uses the font to trigger download on iOS Safari
      var el = document.createElement('span');
      el.className = 'ionicons-preload';
      el.textContent = '.';
      el.setAttribute('aria-hidden', 'true');
      document.addEventListener('DOMContentLoaded', function() {
        document.body.appendChild(el);
      });
      // Also use FontFace API as backup
      if (typeof FontFace !== 'undefined') {
        var font = new FontFace('ionicons',
          'url(https://unpkg.com/@expo/vector-icons@14.0.4/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf)');
        font.load().then(function(loaded) {
          document.fonts.add(loaded);
        }).catch(function(err) {
          console.warn('Ionicons font load failed:', err);
        });
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
