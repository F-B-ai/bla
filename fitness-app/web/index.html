<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ESSĒRE" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>ESSĒRE</title>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #0D0D0D; }

    /* Ionicons font - served locally to avoid CDN/CORS issues on iOS Safari */
    /* Expo/react-native-vector-icons uses lowercase 'ionicons' as font-family */
    @font-face {
      font-family: 'Ionicons';
      src: url('/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'ionicons';
      src: url('/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
  </style>
  <link rel="preload" href="/Ionicons.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
  <script>
    // Force-load Ionicons font for iOS Safari (both cases for compatibility)
    (function() {
      if (typeof FontFace !== 'undefined') {
        var names = ['Ionicons', 'ionicons'];
        names.forEach(function(name) {
          var font = new FontFace(name, 'url(/Ionicons.ttf)');
          font.load().then(function(loaded) {
            document.fonts.add(loaded);
          }).catch(function(err) {
            console.warn(name + ' font load failed:', err);
          });
        });
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
