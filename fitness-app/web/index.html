<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ESSĒRE" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />

  <title>ESSĒRE</title>
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #0D0D0D; }

    /* Preload Ionicons font for Safari/iOS */
    @font-face {
      font-family: 'Ionicons';
      src: url('https://unpkg.com/@expo/vector-icons@14.0.0/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }
  </style>
  <link rel="preload" href="https://unpkg.com/@expo/vector-icons@14.0.0/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf" as="font" type="font/ttf" crossorigin />
  <script>
    // Force-load Ionicons font for iOS Safari via FontFace API
    (function() {
      if (typeof FontFace !== 'undefined') {
        var font = new FontFace('Ionicons',
          'url(https://unpkg.com/@expo/vector-icons@14.0.0/build/vendor/react-native-vector-icons/Fonts/Ionicons.ttf)');
        font.load().then(function(loaded) {
          document.fonts.add(loaded);
        }).catch(function(err) {
          console.warn('Ionicons font load failed:', err);
        });
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
